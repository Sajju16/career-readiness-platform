# ============================================================
# AI-Based Career Readiness – Spring Boot Configuration
# Active profile: dev (local development)
# ============================================================

spring:
  application:
    name: career-ready-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ----- Database (Supabase PostgreSQL) -----
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ----- Flyway -----
  flyway:
    enabled: true
    baseline-on-migrate: true

  # ----- JPA / Hibernate -----
  jpa:
    hibernate:
      ddl-auto: validate         # Use 'create' only on first run, then 'validate'
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ----- File Upload -----
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

# ----- Server -----
server:
  port: ${SERVER_PORT:8080}

# ----- JWT Configuration -----
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}        # 15 minutes
  refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}   # 7 days

# ----- AI Service -----
ai:
  service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}

# ----- Supabase API -----
supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_PUBLISHABLE_KEY}

# ----- Springdoc / Swagger -----
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ----- Logging -----
logging:
  level:
    root: INFO
    com.careerready: DEBUG
